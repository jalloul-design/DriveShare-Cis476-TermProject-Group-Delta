<!DOCTYPE html>
<html>
<head>
    <title>Search Cars</title>
</head>
<body>
    <h1>Search Cars</h1>

    <p><a href="{{ url_for('cars.cars') }}">Back to Cars</a></p>

    <form method="GET">
        <label>Location:</label>
        <input type="text" name="location">

        <br><br>

        <label>Model:</label>
        <input type="text" name="model">

        <br><br>

        <label>Start Date:</label>
        <input type="date" name="start_date">

        <br><br>

        <label>End Date:</label>
        <input type="date" name="end_date">

        <br><br>

        <label>Min Price:</label>
        <input type="number" step="0.01" name="min_price">

        <br><br>

        <label>Max Price:</label>
        <input type="number" step="0.01" name="max_price">

        <br><br>

        <button type="submit">Search</button>
    </form>

    <hr>

    <h2>Results</h2>

    {% if cars %}
        {% for car in cars %}
            <div>
                <h3>{{ car.year }} {{ car.model }}</h3>
                <p>Location: {{ car.pickup_location }}</p>
                <p>Daily Price: ${{ car.daily_price }}</p>

                <a href="{{ url_for('cars.car_detail', car_id=car.id) }}">View Details</a>
            </div>

            <hr>
        {% endfor %}
    {% else %}
        <p>No cars matched your search.</p>
    {% endif %}
</body>
</html>
