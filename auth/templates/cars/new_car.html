<!DOCTYPE html>
<html>
<head>
    <title>New Car Listing</title>
</head>
<body>
    <h1>Create New Car Listing</h1>

    <p><a href="{{ url_for('cars.cars') }}">Back to Cars</a></p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Model:</label>
        <input type="text" name="model" required>

        <br><br>

        <label>Year:</label>
        <input type="number" name="year" required>

        <br><br>

        <label>Mileage:</label>
        <input type="number" name="mileage" required>

        <br><br>

        <label>Pickup Location:</label>
        <input type="text" name="pickup_location" required>

        <br><br>

        <label>Daily Price:</label>
        <input type="number" step="0.01" name="daily_price" required>

        <br><br>

        <label>Available Start Date:</label>
        <input type="date" name="availability_start" required>

        <br><br>

        <label>Available End Date:</label>
        <input type="date" name="availability_end" required>

        <br><br>

        <button type="submit">Create Listing</button>
    </form>
</body>
</html>
