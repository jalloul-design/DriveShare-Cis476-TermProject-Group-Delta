<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Edit Car Listing</title>
</head>
<body>
    <h1>Edit Car Listing</h1>
    <p><a href="{{ url_for('auth.homepage') }}">Back to Homepage</a></p>
    <p><a href="{{ url_for('cars.car_detail', car_id=car.id) }}">Back to Details</a></p>

    {% set first_range = car.availability_calendar[0] %}

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Model:</label>
        <input type="text" name="model" value="{{ car.model }}" required>

        <br><br>

        <label>Year:</label>
        <input type="number" name="year" value="{{ car.year }}" required>

        <br><br>

        <label>Mileage:</label>
        <input type="number" name="mileage" value="{{ car.mileage }}" required>

        <br><br>

        <label>Pickup Location:</label>
        <input type="text" name="pickup_location" value="{{ car.pickup_location }}" required>

        <br><br>

        <label>Daily Price:</label>
        <input type="number" step="0.01" name="daily_price" value="{{ car.daily_price }}" required>

        <br><br>

        <label>Available Start Date:</label>
        <input type="date" name="availability_start" value="{{ first_range['start'] }}" required>

        <br><br>

        <label>Available End Date:</label>
        <input type="date" name="availability_end" value="{{ first_range['end'] }}" required>

        <br><br>

        <button type="submit">Update Car</button>
    </form>
</body>
</html>
