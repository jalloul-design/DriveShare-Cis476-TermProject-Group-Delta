<!DOCTYPE html>
<html lang="en">
<head>
  <title>Recover Account - DriveShare</title>
</head>
<body>
    <h1>Forgot Password?</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p style="color: red;">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <p>Enter your email to start recovering your account.</p>

    <form method="POST">
        <label>Email:</label>
        <input type="email" name="user_email" required><br><br>
        <button type="submit">Continue</button>
    </form>

    <p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
</body>
</html>
