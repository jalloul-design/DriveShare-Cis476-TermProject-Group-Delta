<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password - DriveShare</title>
</head>
<body>
    <h1>Reset Your Password</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <p>You answered all 3 security questions correctly! Enter your new password below.</p>

    <form method="POST">
        <label>New Password:</label>
        <input type="password" name="new_password" required><br><br>
        <button type="submit">Reset Password</button>
    </form>
</body>
</html>
