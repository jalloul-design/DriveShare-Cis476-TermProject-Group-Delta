<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register- DriveShare</title>
</head>
<body>
    <h1>Register</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p style="color: red;">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
   <form method="POST">
       <lable>Email:</lable>
       <input type="email" name = "user_email" required><br><br>
       <label>Password</label>
       <input type="password" name = "user_password" required><br><br>
       <h3>Security Questions (For password recovery ONLY)</h3>
       <label>Question 1:</label>
        <input type="text" name="question1" placeholder=" What's your favorite animal?" required><br>
        <label>Answer 1:</label>
        <input type="text" name="answer1" required><br><br>

        <label>Question 2:</label>
        <input type="text" name="question2" placeholder=" What city were you born in?" required><br>
        <label>Answer 2:</label>
        <input type="text" name="answer2" required><br><br>

        <label>Question 3:</label>
        <input type="text" name="question3" placeholder=" What's your maiden name?" required><br>
        <label>Answer 3:</label>
        <input type="text" name="answer3" required><br><br>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>




</body>
</html>
