<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
       <title>Login - DriveShare</title>
</head>
<body>
    <h1>Login</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Email:</label>
        <input type="email" name="user_email" required><br><br>

        <label>Password:</label>
        <input type="password" name="user_password" required><br><br>

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="{{ url_for('auth.login_register') }}">Register</a></p>
    <p>Forgot password? <a href="{{ url_for('auth.recover_account') }}">Recover</a></p>
</body>
</html>
