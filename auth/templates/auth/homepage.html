<!DOCTYPE html>
<html lang="en">
<head>
     <title>DriveShare</title>
</head>
<body>
    <h1>DriveShare</h1>
    <h3>Peer-to-Peer Car Rental Platform</h3>

    {% if user %}
        <p>Logged in as: {{ user }}</p>
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    {% else %}
        <p>You are not logged in.</p>
        <a href="{{ url_for('auth.login') }}">Login</a> |
        <a href="{{ url_for('auth.login_register') }}">Register</a>
    {% endif %}
</body>
</html>
