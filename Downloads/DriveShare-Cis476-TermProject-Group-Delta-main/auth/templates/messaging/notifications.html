<!DOCTYPE html>
<html>
<head>
    <title>DriveShare Notifications</title>
</head>
<body>
    <h1>Notifications</h1>
    <p>Logged in as: {{ user }}</p>

    {% if notifications %}
        <ul>
        {% for n in notifications %}
            <li>
                <strong>{{ n.notification_type }}</strong>: {{ n.content }}
                <br><small>{{ n.created_at }}</small>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No notifications yet.</p>
    {% endif %}

    <p><a href="{{ url_for('messaging.messages') }}">Back to Inbox</a></p>
</body>
</html>
