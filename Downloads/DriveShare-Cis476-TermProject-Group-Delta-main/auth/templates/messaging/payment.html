<!DOCTYPE html>
<html>
<head>
    <title>DriveShare Payment</title>
</head>
<body>
    <h1>Payment</h1>
    <p>Logged in as: {{ user }}</p>
    <p>Your current demo balance: ${{ "%.2f"|format(balance) }}</p>

    <form method="POST">
        <label>Payee Email:</label><br>
        <input type="email" name="payee_email" required><br><br>

        <label>Amount:</label><br>
        <input type="number" step="0.01" name="amount" required><br><br>

        <label>Booking ID (optional):</label><br>
        <input type="text" name="booking_id"><br><br>

        <button type="submit">Pay</button>
    </form>

    <p><a href="{{ url_for('messaging.history') }}">View Payment History</a></p>
</body>
</html>
