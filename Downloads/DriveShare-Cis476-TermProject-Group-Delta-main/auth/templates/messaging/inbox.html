<!DOCTYPE html>
<html>
<head>
    <title>DriveShare Inbox</title>
</head>
<body>
    <h1>Inbox</h1>
    <p>Logged in as: {{ user }}</p>

    <p><a href="{{ url_for('messaging.new_message') }}">Send New Message</a></p>
    <p><a href="{{ url_for('messaging.notifications') }}">View Notifications</a></p>
    <p><a href="{{ url_for('messaging.pay') }}">Make Payment</a></p>

    <h2>Messages</h2>
    {% if inbox %}
        <ul>
        {% for message in inbox %}
            <li>
                <strong>From:</strong> {{ message.sender_email }}<br>
                <strong>Message:</strong> {{ message.content }}<br>
                <small>{{ message.sent_at }}</small>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No messages yet.</p>
    {% endif %}
</body>
</html>
